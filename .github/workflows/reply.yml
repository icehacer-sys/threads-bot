name: threads-autoreply

# Runs the bot on a schedule in the cloud (no need for your PC to be on).
#
# The cron fires every 10 min during the evening only. The active window
# (8 PM -> midnight Cairo) is enforced in code (BOT_ACTIVE_*, DST-safe). The bot
# replies to the newest post up to BOT_PER_POST_CAP (100); when that's hit it
# disables this schedule (a hard stop) — re-enable it when you post the next case.
# Evening-only stays well within the 2,000 free Actions min/month on a private repo.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANTHROPIC_API_KEY
#   THREADS_ACCESS_TOKEN

on:
  schedule:
    - cron: "*/10 17-21 * * *" # evenings only (UTC band covers 8 PM->midnight Cairo year-round)
  workflow_dispatch: # lets you (or me) run it manually from the Actions tab
    inputs:
      mode:
        description: "Run mode: live (posts) or dry (smoke test, posts nothing)"
        type: choice
        options: [live, dry]
        default: live

# Never let two runs overlap (they'd both read the same state and double-reply).
concurrency:
  group: threads-autoreply
  cancel-in-progress: false

# contents: commit state.json back. actions: disable the schedule when the cap is hit.
permissions:
  contents: write
  actions: write

jobs:
  reply:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: me
      BOT_CONFIRM_LIVE: "yes"
      BOT_EDUCATIONAL: "on"
      BOT_NEWEST_ONLY: "on"
      BOT_VISION: "on"
      BOT_ANSWER: "on"
      BOT_ANSWER_DELAY_HOURS: "1"
      BOT_ANSWER_SPOILER: "on"
      BOT_ACTIVE_TZ: "Africa/Cairo"
      BOT_ACTIVE_START: "20"
      BOT_ACTIVE_END: "0"
      BOT_MODEL: "claude-sonnet-4-6"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Reply to new comments
        id: bot
        run: npm run ${{ github.event.inputs.mode || 'live' }}

      - name: Persist state.json
        # Save progress even if the run errored, but never from a dry smoke test.
        if: always() && github.event.inputs.mode != 'dry'
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "threads-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update reply state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi

      - name: Stop the schedule once the post hits 100 replies
        if: steps.bot.outputs.cap_reached == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Per-post cap reached -> disabling the schedule. Re-enable it when you post the next case."
          gh workflow disable reply.yml
