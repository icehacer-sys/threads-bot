name: threads-autoreply

# Runs the bot on a schedule in the cloud (no need for your PC to be on).
#
# A run polls every 10 min and, before it ends, launches the next run -- a perpetual
# chain that is ALWAYS alive (verified: workflow_dispatch self-launch works with the
# built-in token). The bot posts only inside the active windows (BOT_ACTIVE_WINDOWS,
# Cairo) up to BOT_PER_POST_CAP, so outside the windows the runs just no-op.
# Concurrency keeps it a single chain; the */30 cron restarts it only if it ever dies.
# Start it once (Actions -> Run workflow) and it runs forever; disable the workflow to stop.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANTHROPIC_API_KEY
#   THREADS_ACCESS_TOKEN
#   FB_PAGE_ID              (Facebook Page id — same value as in the xray-cases repo)
#   FB_PAGE_ACCESS_TOKEN    (Facebook Page token — same value as in the xray-cases repo)

on:
  schedule:
    - cron: "*/30 * * * *" # heartbeat to (re)start the polling loop; the loop does the 10-min cadence
  workflow_dispatch: # lets you (or me) run it manually from the Actions tab
    inputs:
      mode:
        description: "Run mode: live (posts) or dry (smoke test, posts nothing)"
        type: choice
        options: [live, dry]
        default: live

# Never let two runs overlap (they'd both read the same state and double-reply).
concurrency:
  group: threads-autoreply
  cancel-in-progress: false

# contents: commit state.json back. actions: hand off to a fresh run near the 6h job limit.
permissions:
  contents: write
  actions: write

jobs:
  reply:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
      THREADS_USER_ID: me
      BOT_CONFIRM_LIVE: "yes"
      BOT_EDUCATIONAL: "on"
      BOT_NEWEST_ONLY: "on" # reply only to the single newest post (focus the night on tonight's fresh case, not the sword)
      BOT_PINNED_POSTS: "17986874135820855" # pinned intro thread (DY_tUxfiMUb): ALSO scanned every run, replying to any un-replied comment. Comma-separated media ids or post URLs. Find ids with: npm run dry -- --list
      BOT_WINDOW_HOURS: "16" # scan only the day's fresh post: 16h excludes the prior day's post (~21-24h old at window open) so the bot focuses on today's, not yesterday's tail
      BOT_VISION: "on"
      BOT_ANSWER: "on"
      BOT_ANSWER_DELAY_HOURS: "1"
      BOT_ANSWER_SPOILER: "on"
      BOT_ACTIVE_TZ: "Africa/Cairo"
      BOT_ACTIVE_WINDOWS: "22-10" # 10 PM until 10 AM Cairo (one overnight window). Changed from 23-11 (owner, 2026-07-07) to match the post moving from 11 PM to 10 PM. Window opens exactly when the post goes up (19:00 UTC = 10 PM Cairo summer).
      BOT_ACTIVE_START: "22"
      BOT_ACTIVE_END: "10"
      BOT_PER_POST_CAP: "220" # sits below the 250 daily cap, leaving headroom for the pinned-thread replies; still covers a viral hit (461-comment post)
      BOT_DAILY_CAP: "250" # Threads' ~250/day ceiling is the hard backstop
      BOT_MODEL: "claude-sonnet-4-6" # quality model: only re-drafts corrections/teaching
      BOT_TRIAGE_MODEL: "claude-haiku-4-5-20251001" # cheap first pass for every comment
      BOT_ESCALATE: "correct,teach,reference" # categories the Haiku triage hands to Sonnet
      BOT_ANTIREPEAT: "15" # smaller anti-repeat list = fewer uncached tokens per call
      BOT_WEB_SEARCH: "on" # search runs ONLY on the Sonnet "reference" re-run (unrecognized memes/refs), never on triage
      BOT_FACEBOOK_REPLY: "off" # FB dropped — Threads only (owner deleted the Page over the "AI info" label, 2026-07-03). fbindex early-returns when off; flip to "on" to restore.
      BOT_GIF_REPLIES: "off" # bot-posted reaction GIFs KILLED by owner (2026-07-07) — text replies only. (Reading COMMENTER GIFs is unaffected; that path stays on.)
      BOT_GIF_CHANCE: "1" # no coin flip — when the model tags a banter reply and caps allow, attach the GIF (owner, 2026-07-04 moderate loosening; was 0.5). Volume is bounded by the model's tag rate + the 1/post, 2/day caps
      BOT_PROMO: "on" # RARE product plug (data/products.json). The reply NAMES the product in-voice on a genuine opening; the raw LINK is attached ONLY when the commenter explicitly asks for it (ask-only links, to keep spam/reach risk low). Never on medical/tender/corrections.
      BOT_PROMO_PER_POST: "1" # hard: never a second LINK on one post
      BOT_PROMO_PER_DAY: "2" # link-frequency is the main spam signal; kept low
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # One run polls every 10 minutes for hours instead of relying on GitHub's
      # cron (which throttles */10 badly). The bot posts only inside the active
      # windows (BOT_ACTIVE_WINDOWS, 11 PM -> 11 AM Cairo); it replies, commits
      # progress, sleeps 10 min, repeats. Near the 6h job limit it hands off to a
      # fresh run so coverage spans the whole window. Stops at the per-post/daily
      # cap or outside the window. State is pushed each cycle so a restart never
      # double-replies. Long runs are free on this public repo.
      - name: Poll every 10 min (perpetual chain); post only inside the active windows
        env:
          MODE: ${{ github.event.inputs.mode || 'live' }}
          GH_TOKEN: ${{ github.token }}
          MAXSECS: "19800" # ~5.5h per run, then it launches the next (under the 6h job limit)
        run: |
          # Push local commits, retrying rebase+push. Runs every loop (not only when the tree is
          # freshly dirty) so a push that failed on a previous loop is genuinely retried instead of
          # being lost at the next hand-off. On a rebase conflict it aborts (never leaves the repo
          # mid-rebase, which used to break every later push in the run) and retries.
          sync_repo() {
            for attempt in 1 2 3; do
              if ! git pull --rebase --autostash origin "${GITHUB_REF_NAME}"; then
                git rebase --abort 2>/dev/null || true
                echo "rebase failed (attempt $attempt/3), retrying in 3s"; sleep 3; continue
              fi
              if git push; then return 0; fi
              echo "push failed (attempt $attempt/3), retrying in 3s"; sleep 3
            done
            echo "WARNING: git sync failed after 3 attempts; will retry next loop"; return 0
          }
          if [ "$MODE" = "dry" ]; then
            npm run dry
            npm run fb:dry || true
            exit 0
          fi
          git config user.name "threads-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          start=$(date +%s)
          fails=0
          for i in $(seq 1 60); do
            echo "::group::poll $i ($(TZ='Africa/Cairo' date +%H:%M) Cairo)"
            if npm run live; then fails=0; else fails=$((fails+1)); echo "iteration $i errored ($fails in a row)"; fi
            # Facebook engagement is far lower than Threads, so scan it every 3rd poll (~30 min)
            # instead of every 10 — cuts FB triage volume ~66% with negligible reply latency.
            if [ "$BOT_FACEBOOK_REPLY" = "on" ] && [ $((i % 3)) -eq 1 ]; then npm run fb:live || echo "fb iteration $i errored, continuing"; fi
            if [ -n "$(git status --porcelain state.json fb-state.json)" ]; then
              git add state.json
              [ -f fb-state.json ] && git add fb-state.json
              git commit -m "chore: update reply state [skip ci]"
            fi
            sync_repo
            echo "::endgroup::"
            # Surface a real outage (dead Threads token, Anthropic billing, ...) that the
            # per-iteration '|| continue' would otherwise hide behind a green run: after 6
            # consecutive Threads-reply failures, fail the job so GitHub emails. The */30 cron
            # restarts the chain. (fb:live stays best-effort so a FB-only issue never trips this.)
            if [ "$fails" -ge 6 ]; then echo "::error::$fails consecutive live failures — aborting so the outage surfaces"; exit 1; fi
            if [ $(( $(date +%s) - start )) -ge "$MAXSECS" ]; then break; fi
            sleep 600
          done
          # Before handing off to a FRESH checkout, make a best effort to land this run's state on
          # origin. The next run clones origin; any un-pushed reply commit would be re-classified and
          # double-posted publicly. This blocking push (5 tries) shrinks that window well below the
          # per-loop sync_repo alone. answeredByMe is the live backstop, but it can't see held/lagging
          # replies, so pushing state is the real guard.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push; then break; fi
            git rebase --abort 2>/dev/null || true
            echo "final state push failed ($attempt/5), retrying in 5s"; sleep 5
          done
          # Perpetual chain: always launch the next run so a loop is ALWAYS alive.
          # The bot itself posts only inside the active windows, up to the cap, so
          # outside the windows these runs just no-op. Concurrency keeps it a single
          # chain; the */30 cron restarts it only if a hand-off ever fails.
          echo "Launching the next run (keeps the bot live 24/7)."
          gh workflow run reply.yml -f mode=live || echo "hand-off dispatch failed"
