name: threads-autoreply

# Runs the bot on a schedule in the cloud (no need for your PC to be on).
#
# The cron fires every 10 min, all day. The active window is OPEN (BOT_ACTIVE_*
# = always on), so it replies to your newest post as soon as comments appear, up
# to BOT_PER_POST_CAP (100), then the cap stops it. NOTE: every-10-min all-day on
# a PRIVATE repo exceeds the 2,000 free Actions min/month (~2 weeks); make the repo
# public for unlimited minutes, or lower the cadence (e.g. */30) to stay free.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANTHROPIC_API_KEY
#   THREADS_ACCESS_TOKEN

on:
  schedule:
    - cron: "*/10 * * * *" # all day, every 10 min (the code gate is open; the 100 cap stops it)
  workflow_dispatch: # lets you (or me) run it manually from the Actions tab
    inputs:
      mode:
        description: "Run mode: live (posts) or dry (smoke test, posts nothing)"
        type: choice
        options: [live, dry]
        default: live

# Never let two runs overlap (they'd both read the same state and double-reply).
concurrency:
  group: threads-autoreply
  cancel-in-progress: false

# Needed so the workflow can commit the updated state.json back to the repo.
permissions:
  contents: write

jobs:
  reply:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: me
      BOT_CONFIRM_LIVE: "yes"
      BOT_EDUCATIONAL: "on"
      BOT_NEWEST_ONLY: "on"
      BOT_VISION: "on"
      BOT_ANSWER: "on"
      BOT_ANSWER_DELAY_HOURS: "1"
      BOT_ANSWER_SPOILER: "on"
      BOT_ACTIVE_TZ: "Africa/Cairo"
      BOT_ACTIVE_START: "0"
      BOT_ACTIVE_END: "24"
      BOT_MODEL: "claude-sonnet-4-6"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Reply to new comments
        run: npm run ${{ github.event.inputs.mode || 'live' }}

      - name: Persist state.json
        # Save progress even if the run errored, but never from a dry smoke test.
        if: always() && github.event.inputs.mode != 'dry'
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "threads-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update reply state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
