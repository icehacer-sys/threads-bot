name: threads-autoreply

# Runs the bot on a schedule in the cloud (no need for your PC to be on).
#
# GitHub's scheduled cron throttles */10 badly, so ONE run polls internally every
# 10 min (sleeping between checks), 8 PM -> 4 AM Cairo, replying to your newest post
# up to BOT_PER_POST_CAP (200), then stopping. Near the 6h job limit it hands off to
# a fresh run so coverage spans the whole window. The */30 cron is a backup restart;
# for a prompt start right after you post, trigger it from the Actions tab.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANTHROPIC_API_KEY
#   THREADS_ACCESS_TOKEN

on:
  schedule:
    - cron: "*/30 * * * *" # heartbeat to (re)start the polling loop; the loop does the 10-min cadence
  workflow_dispatch: # lets you (or me) run it manually from the Actions tab
    inputs:
      mode:
        description: "Run mode: live (posts) or dry (smoke test, posts nothing)"
        type: choice
        options: [live, dry]
        default: live

# Never let two runs overlap (they'd both read the same state and double-reply).
concurrency:
  group: threads-autoreply
  cancel-in-progress: false

# contents: commit state.json back. actions: hand off to a fresh run near the 6h job limit.
permissions:
  contents: write
  actions: write

jobs:
  reply:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: me
      BOT_CONFIRM_LIVE: "yes"
      BOT_EDUCATIONAL: "on"
      BOT_NEWEST_ONLY: "on"
      BOT_VISION: "on"
      BOT_ANSWER: "on"
      BOT_ANSWER_DELAY_HOURS: "1"
      BOT_ANSWER_SPOILER: "on"
      BOT_ACTIVE_TZ: "Africa/Cairo"
      BOT_ACTIVE_START: "20"
      BOT_ACTIVE_END: "4"
      BOT_PER_POST_CAP: "200"
      BOT_DAILY_CAP: "240"
      BOT_MODEL: "claude-sonnet-4-6"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # One run polls every 10 minutes for hours instead of relying on GitHub's
      # cron (which throttles */10 badly). The bash window enforces 8 PM -> 4 AM
      # Cairo; it replies, commits progress, sleeps 10 min, repeats. Near the 6h
      # job limit it hands off to a fresh run so coverage spans the whole window.
      # Stops at the 200 cap or at 4 AM. State is pushed each cycle so a restart
      # never double-replies. Long runs are free on this public repo.
      - name: Reply every 10 min, 8 PM -> 4 AM Cairo, until the post hits 200
        env:
          MODE: ${{ github.event.inputs.mode || 'live' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$MODE" = "dry" ]; then
            npm run dry
            exit 0
          fi
          in_window() { h=$((10#$(TZ='Africa/Cairo' date +%H))); [ "$h" -ge 20 ] || [ "$h" -lt 4 ]; }
          git config user.name "threads-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f .bot-stop
          start=$(date +%s)
          handoff=0
          for i in $(seq 1 60); do
            if ! in_window; then echo "Outside 8 PM-4 AM Cairo. Done for tonight."; break; fi
            echo "::group::poll $i ($(TZ='Africa/Cairo' date +%H:%M) Cairo)"
            npm run live || echo "iteration $i errored, continuing"
            if [ -n "$(git status --porcelain state.json)" ]; then
              git add state.json
              git commit -m "chore: update reply state [skip ci]"
              git pull --rebase --autostash origin main >/dev/null 2>&1 || true
              git push || echo "push failed; will retry next loop"
            fi
            echo "::endgroup::"
            if [ -f .bot-stop ]; then echo "Per-post cap (200) reached. Done."; break; fi
            if [ $(( $(date +%s) - start )) -ge 19800 ]; then echo "~5.5h elapsed; handing off."; handoff=1; break; fi
            sleep 600
          done
          if [ "$handoff" = "1" ] && in_window; then
            echo "Handing off to a fresh run to keep polling until 4 AM."
            gh workflow run reply.yml -f mode=live || echo "hand-off dispatch failed"
          fi
