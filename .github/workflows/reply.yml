name: threads-autoreply

# Runs the bot on a schedule in the cloud (no need for your PC to be on).
#
# GitHub's scheduled cron throttles */10 badly, so ONE run polls internally every
# 10 min for up to ~5h (sleeping between checks), replying to your newest post up
# to BOT_PER_POST_CAP (100), then stopping. The cron below is just a heartbeat to
# (re)start that loop; for a prompt start right after you post, trigger it from the
# Actions tab ("Run workflow"). Long runs are free on this public repo.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANTHROPIC_API_KEY
#   THREADS_ACCESS_TOKEN

on:
  schedule:
    - cron: "*/30 * * * *" # heartbeat to (re)start the polling loop; the loop does the 10-min cadence
  workflow_dispatch: # lets you (or me) run it manually from the Actions tab
    inputs:
      mode:
        description: "Run mode: live (posts) or dry (smoke test, posts nothing)"
        type: choice
        options: [live, dry]
        default: live

# Never let two runs overlap (they'd both read the same state and double-reply).
concurrency:
  group: threads-autoreply
  cancel-in-progress: false

# Needed so the workflow can commit the updated state.json back to the repo.
permissions:
  contents: write

jobs:
  reply:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: me
      BOT_CONFIRM_LIVE: "yes"
      BOT_EDUCATIONAL: "on"
      BOT_NEWEST_ONLY: "on"
      BOT_VISION: "on"
      BOT_ANSWER: "on"
      BOT_ANSWER_DELAY_HOURS: "1"
      BOT_ANSWER_SPOILER: "on"
      BOT_ACTIVE_TZ: "Africa/Cairo"
      BOT_ACTIVE_START: "0"
      BOT_ACTIVE_END: "24"
      BOT_MODEL: "claude-sonnet-4-6"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # One run polls every 10 minutes for hours, instead of relying on GitHub's
      # cron (which throttles */10 badly). It replies, commits progress, sleeps
      # 10 min, repeats — until the post hits 100 or ~5h elapses. State is pushed
      # each cycle so a restart never double-replies. Free on a public repo.
      - name: Reply every 10 min until the post hits 100
        env:
          MODE: ${{ github.event.inputs.mode || 'live' }}
        run: |
          if [ "$MODE" = "dry" ]; then
            npm run dry
            exit 0
          fi
          git config user.name "threads-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f .bot-stop
          start=$(date +%s)
          for i in $(seq 1 50); do
            echo "::group::poll $i ($(date -u +%H:%M:%S)Z)"
            npm run live || echo "iteration $i errored, continuing"
            if [ -n "$(git status --porcelain state.json)" ]; then
              git add state.json
              git commit -m "chore: update reply state [skip ci]"
              git pull --rebase --autostash origin main >/dev/null 2>&1 || true
              git push || echo "push failed; will retry next loop"
            fi
            echo "::endgroup::"
            if [ -f .bot-stop ]; then echo "Per-post cap (100) reached. Done."; break; fi
            if [ $(( $(date +%s) - start )) -ge 18000 ]; then echo "~5h elapsed; stopping (a later run continues)."; break; fi
            sleep 600
          done
